function toggleLangMenu() {
    const list = document.getElementById('langList');
    list.classList.toggle('active');
}

document.addEventListener('click', function(e) {
    const list = document.getElementById('langList');
    const btn = document.getElementById('langBtn');
    if (!btn.contains(e.target) && !list.contains(e.target)) {
        list.classList.remove('active');
    }
});

function changeLang(langCode) {
    localStorage.setItem("lang", langCode);
    applyLang(langCode);
    toggleLangMenu();
}

function applyLang(lang) {
    if (!DATA[lang]) lang = 'ar';
    
    const d = DATA[lang];
    
    // تحديث الهيكل والاتجاه
    document.documentElement.lang = lang;
    document.documentElement.dir = d.dir;
    
    // تحديث النصوص
    document.getElementById('page-title').innerText = d.title;
    document.getElementById('page-desc').content = d.desc;
    
    document.getElementById('currentLangFlag').innerText = d.flag;
    document.getElementById('currentLangText').innerText = d.name;
    
    document.getElementById('navBlog').innerText = d.navBlog;
    document.getElementById('navHome').innerText = d.navHome;
    
    document.getElementById('breadHome').innerText = d.breadHome;
    document.getElementById('breadBlog').innerText = d.breadBlog;
    document.getElementById('breadTitle').innerText = d.breadTitle;
    
    document.getElementById('metaDate').innerText = d.metaDate;
    document.getElementById('metaAuthor').innerText = d.metaAuthor;
    document.getElementById('metaRead').innerText = d.metaRead;
    
    document.getElementById('articleH1').innerText = d.h1;
    document.getElementById('articleBody').innerHTML = d.body;
    
    document.getElementById('footerCopy').innerText = d.footer;
    
    // تحديث حالة الزر
    const links = document.querySelectorAll('.lang-list li a');
    links.forEach(link => {
        if (link.getAttribute('data-lang') === lang) {
            link.classList.add('selected');
        } else {
            link.classList.remove('selected');
        }
    });
}
