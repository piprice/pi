<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --gold: #f0b429;
  --gold-dim: #c8901a;
  --gold-glow: rgba(240, 180, 41, 0.35);
  --bg: #04040f;
  --surface: #0a0a1f;
  --surface2: #0f0f2a;
  --border: rgba(240,180,41,0.12);
  --text: #e8e8ff;
  --muted: #7070a0;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== CANVAS BACKGROUND ===== */
#cosmosCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ===== LAYOUT ===== */
.page-wrap {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

/* ===== HEADER ===== */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28px 0 20px;
  flex-wrap: wrap;
  gap: 14px;
}

.logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 26px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--gold), #fff8e0, var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
  text-shadow: none;
  position: relative;
}

.logo::after {
  content: '';
  position: absolute;
  bottom: -4px; left: 0;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  animation: shimmer 2.5s infinite;
}

@keyframes shimmer {
  0%,100% { opacity: 0.4; transform: scaleX(0.6); }
  50% { opacity: 1; transform: scaleX(1); }
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* Lang button */
.lang-menu { position: relative; }

.lang-btn {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 9px 14px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  font-family: 'Tajawal', sans-serif;
  transition: border-color 0.3s, background 0.3s;
}
.lang-btn:hover { border-color: var(--gold); background: rgba(240,180,41,0.07); }

.lang-list {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  background: #0d0d25;
  border: 1px solid var(--border);
  border-radius: 12px;
  list-style: none;
  padding: 6px 0;
  min-width: 160px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 30px rgba(240,180,41,0.08);
  z-index: 200;
  display: none;
  opacity: 0;
  transform: translateY(-8px);
  transition: opacity 0.25s ease, transform 0.25s ease;
}
.lang-list.open { display: block; opacity: 1; transform: translateY(0); }

.lang-list li a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  color: var(--text);
  text-decoration: none;
  font-size: 13px;
  font-family: 'Tajawal', sans-serif;
  transition: background 0.2s, color 0.2s;
}
.lang-list li a:hover { background: rgba(240,180,41,0.12); color: var(--gold); }
.lang-list li a.selected { color: var(--gold); background: rgba(240,180,41,0.08); }

/* back btn */
.back-btn {
  color: var(--text);
  text-decoration: none;
  border: 1px solid var(--border);
  padding: 9px 16px;
  border-radius: 10px;
  font-size: 13px;
  font-family: 'Tajawal', sans-serif;
  background: var(--surface2);
  transition: 0.3s;
  white-space: nowrap;
}
.back-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(240,180,41,0.07); }

/* ===== HERO ===== */
.hero {
  text-align: center;
  padding: 60px 0 50px;
  position: relative;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(240,180,41,0.1);
  border: 1px solid rgba(240,180,41,0.25);
  color: var(--gold);
  padding: 6px 16px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
  margin-bottom: 24px;
  letter-spacing: 1px;
  animation: fadeUp 0.7s ease both;
}

.hero h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(28px, 5vw, 50px);
  font-weight: 900;
  line-height: 1.15;
  margin-bottom: 16px;
  animation: fadeUp 0.7s ease 0.1s both;
}

.hero h1 .accent {
  background: linear-gradient(135deg, var(--gold), #ffe9a0, var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero p {
  color: var(--muted);
  font-size: 16px;
  max-width: 520px;
  margin: 0 auto 40px;
  line-height: 1.7;
  animation: fadeUp 0.7s ease 0.2s both;
}

/* Pi 3D Coin */
.coin-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 40px;
  animation: fadeUp 0.7s ease 0.15s both;
}

.coin-scene {
  width: 100px;
  height: 100px;
  perspective: 600px;
}

.coin {
  width: 100px;
  height: 100px;
  position: relative;
  transform-style: preserve-3d;
  animation: coinSpin 6s linear infinite;
}

@keyframes coinSpin {
  0% { transform: rotateY(0deg) rotateX(10deg); }
  100% { transform: rotateY(360deg) rotateX(10deg); }
}

.coin-face {
  position: absolute;
  width: 100px; height: 100px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-size: 30px;
  font-weight: 900;
  backface-visibility: hidden;
}

.coin-front {
  background: radial-gradient(circle at 35% 35%, #ffe88a, #c8901a 60%, #7a5200);
  box-shadow: 0 0 30px rgba(240,180,41,0.6), inset 0 3px 8px rgba(255,255,255,0.3);
  color: #7a4500;
  transform: translateZ(5px);
}

.coin-back {
  background: radial-gradient(circle at 65% 35%, #d4a020, #8a6010 60%, #5a3800);
  box-shadow: 0 0 20px rgba(180,120,20,0.5);
  color: #c89030;
  transform: translateZ(-5px) rotateY(180deg);
}

.coin-edge {
  position: absolute;
  width: 100px; height: 10px;
  background: linear-gradient(to bottom, #c8901a, #f0b429, #c8901a);
  top: 45px;
  transform: translateZ(0) rotateX(90deg);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(22px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== STATS BAR ===== */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
  margin-bottom: 50px;
  animation: fadeUp 0.7s ease 0.3s both;
}

.stat-item {
  text-align: center;
}

.stat-num {
  font-family: 'Orbitron', sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--gold);
  display: block;
}

.stat-label {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
  letter-spacing: 1px;
}

/* ===== SECTION TITLE ===== */
.section-head {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 30px;
}

.section-head h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 2px;
}

.section-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(240,180,41,0.3), transparent);
}

/* ===== GRID ===== */
.blog-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 22px;
}

/* ===== CARD ===== */
a.blog-card { color: inherit; text-decoration: none; display: block; }
a.blog-card.featured { display: grid; }

.blog-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 26px;
  position: relative;
  overflow: hidden;
  transition: transform 0.4s cubic-bezier(0.23,1,0.32,1),
              border-color 0.4s,
              box-shadow 0.4s;
  cursor: pointer;
  opacity: 0;
  transform: translateY(30px) rotateX(8deg);
  transform-style: preserve-3d;
  perspective: 800px;
}

.blog-card.visible {
  animation: cardReveal 0.6s cubic-bezier(0.23,1,0.32,1) forwards;
}

@keyframes cardReveal {
  from { opacity: 0; transform: translateY(30px) rotateX(8deg) scale(0.97); }
  to { opacity: 1; transform: translateY(0) rotateX(0deg) scale(1); }
}

.blog-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(240,180,41,0.08) 0%, transparent 65%);
  opacity: 0;
  transition: opacity 0.4s;
  border-radius: 20px;
}

.blog-card:hover {
  transform: translateY(-8px) scale(1.02);
  border-color: rgba(240,180,41,0.4);
  box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 40px rgba(240,180,41,0.1);
}

.blog-card:hover::before { opacity: 1; }

/* glow line top */
.card-glow-line {
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  border-radius: 2px;
  opacity: 0;
  transition: opacity 0.4s;
}
.blog-card:hover .card-glow-line { opacity: 1; }

/* card number */
.card-number {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  color: rgba(240,180,41,0.4);
  margin-bottom: 14px;
  letter-spacing: 2px;
}

/* card icon */
.card-icon {
  width: 42px; height: 42px;
  background: rgba(240,180,41,0.1);
  border: 1px solid rgba(240,180,41,0.2);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  margin-bottom: 16px;
  transition: background 0.3s, transform 0.3s;
}
.blog-card:hover .card-icon {
  background: rgba(240,180,41,0.18);
  transform: scale(1.1) rotateZ(5deg);
}

.card-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  line-height: 1.45;
}

.card-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.65;
  margin-bottom: 20px;
}

.read-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--gold);
  text-decoration: none;
  font-size: 13px;
  font-weight: 700;
  transition: gap 0.3s;
}
.read-link:hover { gap: 10px; }

.read-arrow {
  font-size: 16px;
  transition: transform 0.3s;
}
.read-link:hover .read-arrow { transform: translateX(-3px); }

/* Featured card (first) */
.blog-card.featured {
  grid-column: span 2;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  align-items: center;
  background: linear-gradient(135deg, #0a0a22, #120e30);
  border-color: rgba(240,180,41,0.2);
}

.blog-card.featured .card-content { }

.featured-visual {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 140px;
}

.floating-pi {
  font-family: 'Orbitron', sans-serif;
  font-size: 72px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--gold), #ffe9a0, var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: floatPi 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(240,180,41,0.5));
}

@keyframes floatPi {
  0%,100% { transform: translateY(0) rotateZ(-2deg); }
  50% { transform: translateY(-12px) rotateZ(2deg); }
}

/* ===== FOOTER ===== */
footer {

  margin-top: 60px;
  padding: 30px 0 20px;
  border-top: 1px solid var(--border);
  color: var(--muted);
  font-size: 12px;
}

footer .footer-logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--gold);
  display: block;
  margin-bottom: 8px;

/* ===== RTL fixes ===== */
[dir="rtl"] .read-link { flex-direction: row-reverse; }
[dir="rtl"] .read-arrow { transform: scaleX(-1); }
[dir="rtl"] .read-link:hover .read-arrow { transform: scaleX(-1) translateX(-3px); }
[dir="rtl"] .section-line {
  background: linear-gradient(270deg, rgba(240,180,41,0.3), transparent);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 700px) {
  .blog-card.featured {
    grid-column: span 1;
    grid-template-columns: 1fr;
  }
  .featured-visual { height: 80px; }
  .floating-pi { font-size: 50px; }
  .stats-bar { gap: 24px; }
}

/* ===== SCROLL TOP ===== */
.scroll-top {
  position: fixed;
  bottom: 30px;
  left: 30px;
  width: 44px; height: 44px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  color: var(--gold);
  transition: 0.3s;
  opacity: 0;
  pointer-events: none;
  z-index: 100;
}
.scroll-top.show { opacity: 1; pointer-events: all; }
.scroll-top:hover { background: rgba(240,180,41,0.12); transform: translateY(-3px); }

/* ===== NEW BADGE ===== */
.new-badge {
  position: absolute;
  top: 20px;
  left: 20px;
  background: linear-gradient(135deg, #f0b429, #ff6b35);
  color: #000;
  font-size: 10px;
  font-weight: 900;
  padding: 4px 10px;
  border-radius: 100px;
  letter-spacing: 1px;
  z-index: 10;
}

[dir="rtl"] .new-badge {
  left: auto;
  right: 20px;
}
</style>

<script>
/* ============================================================
   COSMOS BACKGROUND CANVAS
   ============================================================ */
(function() {
  const canvas = document.getElementById('cosmosCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [], hexes = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 160; i++) {
      stars.push({
        x: Math.random() * W, y: Math.random() * H,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random(),
        speed: Math.random() * 0.3 + 0.05
      });
    }
  }

  function initHexes() {
    hexes = [];
    for (let i = 0; i < 8; i++) {
      hexes.push({
        x: Math.random() * W, y: Math.random() * H,
        size: Math.random() * 60 + 30,
        rot: Math.random() * Math.PI,
        rotSpeed: (Math.random() - 0.5) * 0.003,
        a: Math.random() * 0.06 + 0.02,
        vx: (Math.random() - 0.5) * 0.2,
        vy: (Math.random() - 0.5) * 0.15
      });
    }
  }

  function drawHex(cx, cy, size, rot) {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = rot + (Math.PI / 3) * i;
      const px = cx + size * Math.cos(angle);
      const py = cy + size * Math.sin(angle);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);

    /* stars */
    stars.forEach(s => {
      s.y -= s.speed;
      if (s.y < 0) s.y = H;
      s.a = 0.4 + 0.5 * Math.abs(Math.sin(t * 0.001 + s.x));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(240,200,100,${s.a})`;
      ctx.fill();
    });

    /* floating hexagons */
    hexes.forEach(h => {
      h.rot += h.rotSpeed;
      h.x += h.vx;
      h.y += h.vy;
      if (h.x < -100) h.x = W + 100;
      if (h.x > W + 100) h.x = -100;
      if (h.y < -100) h.y = H + 100;
      if (h.y > H + 100) h.y = -100;

      drawHex(h.x, h.y, h.size, h.rot);
      ctx.strokeStyle = `rgba(240,180,41,${h.a})`;
      ctx.lineWidth = 1;
      ctx.stroke();

      drawHex(h.x, h.y, h.size * 0.6, h.rot + 0.5);
      ctx.strokeStyle = `rgba(240,180,41,${h.a * 0.5})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    });

    /* grid lines (subtle) */
    ctx.strokeStyle = 'rgba(240,180,41,0.025)';
    ctx.lineWidth = 0.5;
    const gap = 80;
    for (let x = 0; x < W; x += gap) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += gap) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    requestAnimationFrame(draw);
  }

  resize();
  initStars();
  initHexes();
  requestAnimationFrame(draw);
  window.addEventListener('resize', () => { resize(); initStars(); });
})();

/* ============================================================
   CARD 3D TILT EFFECT
   ============================================================ */
function applyTilt(card) {
  card.addEventListener('mousemove', e => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const cx = rect.width / 2, cy = rect.height / 2;
    const rotX = (y - cy) / cy * -6;
    const rotY = (x - cx) / cx * 8;
    card.style.transform = `translateY(-8px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.02)`;
    card.style.setProperty('--mx', `${(x / rect.width) * 100}%`);
    card.style.setProperty('--my', `${(y / rect.height) * 100}%`);
  });
  card.addEventListener('mouseleave', () => {
    card.style.transform = '';
  });
}

/* ============================================================
   LANGUAGE DATA

/* ============================================================
   RENDER ARTICLES
   ============================================================ */
function renderArticles(lang) {
  const grid = document.getElementById('blogGrid');
  const ui = UI[lang] || UI['ar'];
  let html = '';

  articles.forEach((a, i) => {
    const t = a.title[lang] || a.title['ar'];
    const d = a.desc[lang] || a.desc['ar'];
    const icon = ICONS[i] || '📄';
    const num = String(i + 1).padStart(2, '0');

    const url = `https://piprice.store/blog/article-${a.id}.html?lang=${lang}`;

    if (a.featured) {
      html += `
        <a href="${url}" class="blog-card featured" style="animation-delay:${i*0.07}s;">
          <div class="card-glow-line"></div>
          <div class="card-content">
            <div class="card-number">— ${num}</div>
            <div class="card-title" style="font-size:20px;">${t}</div>
            <div class="card-desc">${d}</div>
            <span class="read-link">
              <span>${ui.read}</span>
              <span class="read-arrow">→</span>
            </span>
          </div>
          <div class="featured-visual">
            <div class="floating-pi">π</div>
          </div>
        </a>`;
    } else {
      const newBadge = a.isNew ? '<span class="new-badge">NEW</span>' : '';
      html += `
        <a href="${url}" class="blog-card" style="animation-delay:${i*0.07}s;">
          <div class="card-glow-line"></div>
          ${newBadge}
          <div class="card-number">— ${num}</div>
          <div class="card-icon">${icon}</div>
          <div class="card-title">${t}</div>
          <div class="card-desc">${d}</div>
          <span class="read-link">
            <span>${ui.read}</span>
            <span class="read-arrow">→</span>
          </span>
        </a>`;
    }
  });

  grid.innerHTML = html;

  // Intersection observer for card reveal
  const cards = grid.querySelectorAll('.blog-card');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        applyTilt(entry.target);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

  cards.forEach(c => observer.observe(c));
}

/* ============================================================
   SET LANGUAGE
   ============================================================ */
function setLang(lang) {
  if (!UI[lang]) lang = 'ar';
  const ui = UI[lang];

  try { localStorage.setItem('lang', lang); } catch(e) {}

  // Update URL to reflect selected language without reloading
  try {
    const u = new URL(window.location.href);
    u.searchParams.set('lang', lang);
    window.history.replaceState(null, '', u.toString());
  } catch(e) {}

  // Update Back Button Link to hold current lang
  const backBtn = document.getElementById('backBtn');
  if(backBtn) backBtn.href = '../?lang=' + lang;

  // dir
  document.documentElement.lang = lang;
  document.documentElement.dir = ui.dir;

  // text
  document.title = ui.pageTitle;
  document.getElementById('heroTitle').innerHTML = ui.heroTitle;
  document.getElementById('heroDesc').textContent = ui.heroDesc;
  if(backBtn) backBtn.textContent = ui.back;
  document.getElementById('sectionTitle').textContent = ui.section;
  document.getElementById('badgeText').textContent = ui.badge;
  document.getElementById('stat1lbl').textContent = ui.stat1;
  document.getElementById('stat2lbl').textContent = ui.stat2;
  document.getElementById('stat3lbl').textContent = ui.stat3;
  document.getElementById('footerText').textContent = ui.footer;

  // lang button
  document.getElementById('currentFlag').textContent = ui.flag;
  document.getElementById('currentName').textContent = ui.name;

  // selected state
  document.querySelectorAll('.lang-list li a').forEach(a => {
    a.classList.toggle('selected', a.getAttribute('data-lang') === lang);
  });

  renderArticles(lang);
}

/* ============================================================
   LANG MENU TOGGLE
   ============================================================ */
document.getElementById('langBtn').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('langList').classList.toggle('open');
});

document.querySelectorAll('.lang-list li a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    setLang(a.getAttribute('data-lang'));
    document.getElementById('langList').classList.remove('open');
  });
});

document.addEventListener('click', () => {
  document.getElementById('langList').classList.remove('open');
});

/* ============================================================
   SCROLL TOP
   ============================================================ */
window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 300);
});

/* ============================================================
   INIT
   ============================================================ */
const urlParams = new URLSearchParams(window.location.search);
const urlLang = urlParams.get('lang');
const savedLang = localStorage.getItem('lang');
const initLang = (urlLang && UI[urlLang]) ? urlLang : (savedLang && UI[savedLang]) ? savedLang : 'ar';

setLang(initLang);
</script>
