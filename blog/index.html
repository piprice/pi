// 3. دالة إنشاء كروت المقالات (تم تعديلها لقراءة اللغة الحالية)
function renderArticles() {
    const grid = document.getElementById('blogGrid');
    const lang = localStorage.getItem("lang") || "ar";
    const currentLang = BLOG_LANG[lang] || BLOG_LANG['ar'];

    let htmlContent = '';

    articles.forEach(article => {
        // نجيب العنوان والوصف بناءً على اللغة، ولو مش موجودين نرجع للعربية
        const title = article.title[lang] || article.title['ar'];
        const desc = article.desc[lang] || article.desc['ar'];

        htmlContent += `
            <div class="blog-card">
                <h2>${title}</h2>
                <p>${desc}</p>
                <a href="article-${article.id}.html" class="read-more">
                    ${currentLang.read} &rarr;
                </a>
            </div>
        `;
    });

    grid.innerHTML = htmlContent;
}

// 4. دالة فتح وإغلاق القائمة
function toggleLangMenu() {
    const list = document.getElementById('langList');
    list.classList.toggle('active');
}

// إغلاق القائمة عند النقر خارجها
document.addEventListener('click', function(e) {
    const list = document.getElementById('langList');
    const btn = document.getElementById('langBtn');
    if (!btn.contains(e.target) && !list.contains(e.target)) {
        list.classList.remove('active');
    }
});

// 5. دالة تغيير اللغة
function changeLang(langCode) {
    localStorage.setItem("lang", langCode);
    setBlogLang(langCode);
    toggleLangMenu(); // إغلاق القائمة بعد الاختيار
}

function setBlogLang(lang){
    if(!BLOG_LANG[lang]) lang="ar";
    
    const langData = BLOG_LANG[lang];
    
    // تحديث واجهة المستخدم
    document.documentElement.lang = lang;
    document.getElementById("blogTitle").innerText = langData.title;
    document.getElementById("blogDesc").innerText = langData.desc;
    document.getElementById("backHome").innerText = langData.back;
    document.title = langData.pageTitle;
    
    // تحديث زر اختيار اللغة (العلم والاسم)
    document.getElementById("currentLangFlag").innerText = langData.flag;
    document.getElementById("currentLangText").innerText = langData.name;

    // تحديث حالة التحديد (Selected) في القائمة - طريقة محسنة
    const links = document.querySelectorAll('.lang-list li a');
    links.forEach(link => {
        if (link.getAttribute('data-lang') === lang) {
            link.classList.add('selected');
        } else {
            link.classList.remove('selected');
        }
    });
    
    // إعادة رسم المقالات لتحديث النصوص
    renderArticles();
}

// التهيئة عند تحميل الصفحة
let lang = localStorage.getItem("lang") || "ar";
setBlogLang(lang);
