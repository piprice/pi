<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title id="page-title">مدونة PiPrice | أخبار Pi Network</title>
<meta name="description" id="page-desc" content="تابع مدونة PiPrice لمعرفة أحدث أخبار Pi Network وتحليلات سعر Pi اليوم">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
body{
font-family:'Tajawal',sans-serif;
background:#070711;
color:#fff;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
position: relative; /* لترتيب العناصر */
flex-wrap: wrap;
gap: 10px;
}

.logo{
font-size:22px;
font-weight:900;
color:#d4a017;
}

.header-actions{
display: flex;
align-items: center;
gap: 15px;
}

.back-btn{
color:#fff;
text-decoration:none;
border:1px solid rgba(255,255,255,0.2);
padding:8px 14px;
border-radius:8px;
font-size:13px;
transition: 0.3s;
background: rgba(255,255,255,0.05);
}
.back-btn:hover{
background: rgba(255,255,255,0.15);
}

/* تنسيق قائمة اللغة */
.lang-menu{
position: relative;
font-family: sans-serif;
}

.lang-btn{
background: #141428;
color: #fff;
padding: 8px 12px;
border-radius: 8px;
border: 1px solid rgba(255,255,255,0.1);
cursor: pointer;
display: flex;
align-items: center;
gap: 8px;
font-size: 13px;
}

.lang-list{
position: absolute;
top: 45px;
right: 0; /* محاذاة لليمين لتناسب الغة العربية */
background: #141428;
border-radius: 8px;
list-style: none;
padding: 5px 0;
margin: 0;
width: 140px;
box-shadow: 0 10px 20px rgba(0,0,0,0.5);
z-index: 100;
display: none; /* مخفية افتراضياً */
opacity: 0;
transform: translateY(-10px);
transition: opacity 0.2s ease, transform 0.2s ease;
}

.lang-list.active{
display: block;
opacity: 1;
transform: translateY(0);
}

.lang-list li a{
display: flex;
align-items: center;
gap: 10px;
padding: 10px 15px;
color: #fff;
text-decoration: none;
font-size: 13px;
transition: background 0.2s;
}

.lang-list li a:hover{
background: #d4a017; /* لون ذهبي عند التمرير */
color: #000;
}

.lang-list li a.selected{
background: rgba(212, 160, 23, 0.2);
color: #d4a017;
}

/* باقي التنسيقات */
.blog-header{
text-align:center;
margin:40px 0;
}

.blog-header h1{
color:#d4a017;
font-size:30px;
margin-bottom:10px;
}

.blog-header p{
color:#aaa;
max-width:600px;
margin:auto;
line-height: 1.6;
}

.blog-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
margin-top:30px;
}

.blog-card{
background:#141428;
padding:20px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.05);
transition: 0.3s;
}
.blog-card:hover{
transform: translateY(-5px);
border-color: rgba(212, 160, 23, 0.3);
}

.blog-card h2{
font-size:17px;
margin-bottom:10px;
color: #fff;
}

.blog-card p{
font-size:13px;
color:#aaa;
line-height: 1.5;
margin-bottom: 15px;
}

.read-more{
color:#d4a017;
text-decoration:none;
font-weight:700;
font-size:13px;
}

footer{
text-align:center;
margin-top:40px;
padding-bottom: 20px;
font-size:12px;
color:#888;
}
</style>
</head>

<body>

<div class="container">

<header>
<div class="logo">PiPrice</div>
<div class="header-actions">
    
    <!-- قائمة تغيير اللغة -->
    <div class="lang-menu">
        <button class="lang-btn" id="langBtn" onclick="toggleLangMenu()">
            <!-- سيتم تحديث المحتوى بواسطة الجافاسكربت -->
            <span id="currentLangFlag">🇸🇦</span>
            <span id="currentLangText">العربية</span>
            <span style="font-size:10px;">▼</span>
        </button>
        <ul class="lang-list" id="langList">
            <li><a href="javascript:void(0)" onclick="changeLang('ar')">🇸🇦 العربية</a></li>
            <li><a href="javascript:void(0)" onclick="changeLang('en')">🇬🇧 GB English</a></li>
            <li><a href="javascript:void(0)" onclick="changeLang('fr')">🇫🇷 FR Français</a></li>
            <li><a href="javascript:void(0)" onclick="changeLang('zh')">🇨🇳 CN 中文</a></li>
            <li><a href="javascript:void(0)" onclick="changeLang('hi')">🇮🇳 IN हिन्दी</a></li>
            <li><a href="javascript:void(0)" onclick="changeLang('fil')">🇵🇭 PH Filipino</a></li>
        </ul>
    </div>

    <a href="../" class="back-btn" id="backHome">العودة للرئيسية</a>
</div>
</header>

<div class="blog-header">
<h1 id="blogTitle">مدونة PiPrice</h1>
<p id="blogDesc">دليلك الكامل لأخبار Pi Network وسعر Pi اليوم</p>
</div>

<div class="blog-grid" id="blogGrid"></div>

<footer>© PiPrice 2026</footer>

</div>

<script>

// 1. إعدادات اللغة والترجمة
const BLOG_LANG = {
ar:{
title:"مدونة PiPrice",
desc:"دليلك الكامل لأخبار Pi Network وسعر Pi اليوم",
back:"العودة للرئيسية",
read:"قراءة المقال",
pageTitle: "مدونة PiPrice | أخبار Pi Network",
flag: "🇸🇦",
name: "العربية"
},
en:{
title:"PiPrice Blog",
desc:"Your guide to Pi Network news and Pi price today",
back:"Back to Home",
read:"Read article",
pageTitle: "PiPrice Blog | Pi Network News",
flag: "🇬🇧",
name: "GB English"
},
fr:{
title:"Blog PiPrice",
desc:"Actualités Pi Network et prix du Pi aujourd'hui",
back:"Retour à l'accueil",
read:"Lire l'article",
pageTitle: "Blog PiPrice | Nouvelles Pi Network",
flag: "🇫🇷",
name: "FR Français"
},
zh:{
title:"PiPrice 博客",
desc:"了解 Pi Network 新闻和今日 Pi 价格",
back:"返回主页",
read:"阅读文章",
pageTitle: "PiPrice 博客 | Pi Network 新闻",
flag: "🇨🇳",
name: "CN 中文"
},
hi:{
title:"PiPrice ब्लॉग",
desc:"Pi Network समाचार और आज की Pi कीमत",
back:"होम पेज",
read:"लेख पढ़ें",
pageTitle: "PiPrice ब्लॉग | Pi Network समाचार",
flag: "🇮🇳",
name: "IN हिन्दी"
},
fil:{
title:"PiPrice Blog",
desc:"Balita ng Pi Network at presyo ng Pi ngayon",
back:"Bumalik sa Home",
read:"Basahin ang artikulo",
pageTitle: "PiPrice Blog | Balita ng Pi Network",
flag: "🇵🇭",
name: "PH Filipino"
}
};

// 2. بيانات المقالات
const articles = [
    { id: 1, title: "ما هو piprice وكيف يحدد سعر Pi؟", desc: "piprice هو مؤشر لمتابعة سعر Pi Network اليوم في الأسواق بطريقة لحظية." },
    { id: 2, title: "أخبار Pi Network: التحديثات الجديدة", desc: "تعرف على آخر التحديثات والتطورات في شبكة باي نيتورك خلال الفترة الحالية." },
    { id: 3, title: "كيفية استخدام محفظة Pi Wallet", desc: "دليلك الشامل لإنشاء محفظة Pi Wallet وتأمين مفاتيحك الخاصة بشكل صحيح." },
    { id: 4, title: "توقعات سعر عملة Pi Network", desc: "تحليلات وتوقعات خبراء العملات الرقمية حول مستقبل سعر عملة Pi." },
    { id: 5, title: "ما هو KYC ولماذا هو مهم؟", desc: "شرح مفصل لعملية التحقق من الهوية KYC في شبكة Pi Network وأهميتها." },
    { id: 6, title: "الفرق بين Pi Mainnet و Testnet", desc: "مقال يوضح الفروقات الجوهرية بين الشبكة التجريبية والشبكة الرئيسية." },
    { id: 7, title: "دليل استخدام متصفح Pi Browser", desc: "خطوات تحميل واستخدام متصفح Pi Browser للوصول لتطبيقات النظام البيئي." },
    { id: 8, title: "نصائح أمنية لحماية حساب Pi الخاص بك", desc: "أفضل الممارسات لتأمين حسابك من السرقة والاحتيال في عالم العملات." },
    { id: 9, title: "كيفية السحب والتحويل في Pi Network", desc: "خطوات عملية لسحب وتحويل أرصدة Pi بعد فتح الشبكة الرئيسية." },
    { id: 10, title: "مستقبل تطبيقات Pi Apps", desc: "نظرة على التطبيقات المبنية على شبكة Pi وكيف ستغير اقتصاد العملات." },
    { id: 11, title: "حقائق وشائعات حول Pi Network", desc: "نفي وتوضيح أشهر الشائعات المنتشرة حول عملة Pi Network." },
    { id: 12, title: "كيف تشارك في مجتمع Pi Network؟", desc: "دليل للانضمام للمجتمعات الفعالة والمساهمة في تطوير الشبكة." }
];

// 3. دالة إنشاء كروت المقالات
function renderArticles() {
    const grid = document.getElementById('blogGrid');
    const lang = localStorage.getItem("lang") || "ar";
    const currentLang = BLOG_LANG[lang] || BLOG_LANG['ar'];

    let htmlContent = '';

    articles.forEach(article => {
        htmlContent += `
            <div class="blog-card">
                <h2>${article.title}</h2>
                <p>${article.desc}</p>
                <a href="article-${article.id}.html" class="read-more">
                    ${currentLang.read} &rarr;
                </a>
            </div>
        `;
    });

    grid.innerHTML = htmlContent;
}

// 4. دالة فتح وإغلاق القائمة
function toggleLangMenu() {
    const list = document.getElementById('langList');
    list.classList.toggle('active');
}

// إغلاق القائمة عند النقر خارجها
document.addEventListener('click', function(e) {
    const list = document.getElementById('langList');
    const btn = document.getElementById('langBtn');
    if (!btn.contains(e.target) && !list.contains(e.target)) {
        list.classList.remove('active');
    }
});

// 5. دالة تغيير اللغة
function changeLang(langCode) {
    localStorage.setItem("lang", langCode);
    setBlogLang(langCode);
    toggleLangMenu(); // إغلاق القائمة بعد الاختيار
}

function setBlogLang(lang){
    if(!BLOG_LANG[lang]) lang="ar";
    
    const langData = BLOG_LANG[lang];
    
    // تحديث واجهة المستخدم
    document.documentElement.lang = lang;
    document.getElementById("blogTitle").innerText = langData.title;
    document.getElementById("blogDesc").innerText = langData.desc;
    document.getElementById("backHome").innerText = langData.back;
    document.title = langData.pageTitle;
    
    // تحديث زر اختيار اللغة (العلم والاسم)
    document.getElementById("currentLangFlag").innerText = langData.flag;
    document.getElementById("currentLangText").innerText = langData.name;

    // تحديث حالة التحديد (Selected) في القائمة
    const links = document.querySelectorAll('.lang-list li a');
    links.forEach(link => {
        link.classList.remove('selected');
        // التحقق من اللغة المضغوطة (بسيطة شوية عشان الكود يشتغل)
        if (link.onclick.toString().includes(`'${lang}'`)) {
            link.classList.add('selected');
        }
    });
    
    // إعادة رسم المقالات لتحديث زر "قراءة المقال"
    renderArticles();
}

// التهيئة عند تحميل الصفحة
let lang = localStorage.getItem("lang") || "ar";
setBlogLang(lang);

</script>

</body>
</html>
